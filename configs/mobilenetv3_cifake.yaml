seed: 42
device: cuda

data:
  root: data/cifake
  image_size: 224
  num_workers: 4
  class_names: [real, fake]

train:
  epochs: 10
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.0001
  label_smoothing: 0.05
  amp: true
  grad_clip_norm: 1.0
  early_stop_patience: 4

model:
  backbone: mobilenet_v3_small
  pretrained: true
  branch_mode: rgb
  dropout: 0.25
  hidden_dim: 512

output:
  dir: outputs_cifake
  checkpoint_name: best_model.pt
